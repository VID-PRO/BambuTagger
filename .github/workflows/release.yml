# ============================================================
#  BambuTagger — Automatic Build & Release
#  Compiles the ESP32 sketch and publishes a GitHub Release
#  every time a version tag (v*) is pushed.
#  A normal push to main only compiles (smoke-test, no release).
# ============================================================

name: Build & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:        # allow manual runs from the Actions tab

# ── Permissions needed for release creation ────────────────────
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install arduino-cli ───────────────────────────────
      - name: Set up arduino-cli
        uses: arduino/setup-arduino-cli@v2

      # ── 3. Cache the ESP32 platform + libraries ──────────────
      - name: Cache Arduino data
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: arduino-esp32-${{ runner.os }}-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: arduino-esp32-${{ runner.os }}-

      # ── 4. Install ESP32 Arduino core ────────────────────────
      - name: Install ESP32 platform
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          # Pin to a known-good 2.x release that ships mbedTLS + FFat
          arduino-cli core install esp32:esp32@2.0.17

      # ── 5. Install required libraries ────────────────────────
      - name: Install libraries
        run: |
          arduino-cli lib install "MFRC522"
          arduino-cli lib install "Adafruit SH110X"
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit NeoPixel"
          arduino-cli lib install "ArduinoJson"

      # ── 6. Compile sketch ────────────────────────────────────
      # Board options:
      #   PartitionScheme=default_ffat  → "Default 4MB with ffat"
      #   (matches the partition scheme used by the sketch)
      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --build-property build.partitions=default_ffat \
            --output-dir "${{ github.workspace }}/build" \
            --warnings none \
            "${{ github.workspace }}/BambuTagger.ino"

      # ── 7. Build a merged flashable binary ───────────────────
      # Combines bootloader + partition table + app into a single
      # .bin that can be flashed at address 0x00 with esptool.
      - name: Create merged binary
        run: |
          pip install esptool --quiet
          # Locate the ESP32 build artefacts
          BOOT="${{ github.workspace }}/build/BambuTagger.ino.bootloader.bin"
          PART="${{ github.workspace }}/build/BambuTagger.ino.partitions.bin"
          APP="${{ github.workspace }}/build/BambuTagger.ino.bin"
          MERGED="${{ github.workspace }}/build/BambuTagger_merged.bin"

          esptool \
            --chip esp32 \
            merge-bin \
            --output "$MERGED" \
            --flash-mode dio \
            --flash-freq 80m \
            --flash-size 4MB \
            0x1000  "$BOOT" \
            0x8000  "$PART" \
            0xe000  ~/.arduino15/packages/esp32/hardware/esp32/2.0.17/tools/partitions/boot_app0.bin \
            0x10000 "$APP"

          echo "=== Build artefacts ==="
          ls -lh "${{ github.workspace }}/build/"

      # ── 8. Upload artefacts (available for every build) ──────
      - name: Upload firmware artefacts
        uses: actions/upload-artifact@v4
        with:
          name: BambuTagger-firmware-${{ github.sha }}
          retention-days: 30
          path: |
            build/BambuTagger.ino.bin
            build/BambuTagger.ino.bootloader.bin
            build/BambuTagger.ino.partitions.bin
            build/BambuTagger_merged.bin

      # ── 9. Create GitHub Release (tags only) ─────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "BambuTagger ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            build/BambuTagger.ino.bin
            build/BambuTagger.ino.bootloader.bin
            build/BambuTagger.ino.partitions.bin
            build/BambuTagger_merged.bin
          body: |
            ## Flashing instructions

            ### Easiest — merged binary (single file, address 0x00)
            ```
            esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 921600 \
              write_flash 0x0 BambuTagger_merged.bin
            ```

            ### Manual — three separate files
            ```
            esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 921600 \
              write_flash \
              0x1000  BambuTagger.ino.bootloader.bin \
              0x8000  BambuTagger.ino.partitions.bin \
              0x10000 BambuTagger.ino.bin
            ```

            > **Partition scheme:** Default 4MB with FFat  
            > **Board:** ESP32 Dev Module  
            > **Core:** esp32:esp32 2.0.17
